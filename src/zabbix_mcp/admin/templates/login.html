<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Zabbix MCP Admin</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <img src="/static/logo-horizontal-dark.svg" alt="initMAX" class="logo-light-theme" style="height: 48px;">
                <img src="/static/logo-horizontal-light.svg" alt="initMAX" class="logo-dark-theme" style="height: 48px;">
            </div>
            <h1 class="login-title">Zabbix MCP Server</h1>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            <form method="post" action="/login" autocomplete="on">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Enter username" required autofocus autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter password" required autocomplete="current-password">
                </div>
                <div class="form-group" style="margin-top: 24px;">
                    <button type="submit" class="btn btn-primary w-full btn-lg">Login</button>
                </div>
            </form>
        </div>
        <div class="login-footer">
            &copy; {{ year }} initMAX s.r.o. All rights reserved.
        </div>
    </div>

    <script>
    (function() {
        var saved = localStorage.getItem('theme');
        if (saved) {
            document.documentElement.setAttribute('data-theme', saved);
        } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    })();
    </script>
</body>
</html>
